<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>万物声长 · 亲子音乐会邀请函</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"PingFang SC","Microsoft YaHei",sans-serif;
background:#f2f2f2;
overflow:hidden;
}

/* 打开页 */

.cover{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(135deg,#2c7a7b,#1a365d);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:10;
transition:1s;
color:white;
}

.cover h1{
font-size:32px;
margin-bottom:30px;
}

.open-btn{
padding:14px 40px;
background:white;
color:#333;
border-radius:40px;
font-size:18px;
cursor:pointer;
}

/* 主内容 */

.main{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* 海报 */

.poster{
width:90%;
max-width:520px;
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
animation:float 6s ease-in-out infinite;
}

.poster img{
width:100%;
border-radius:10px;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0px)}
}

/* 音乐按钮 */

.music{
position:fixed;
top:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
animation:spin 6s linear infinite;
}

.music.pause{
animation:none;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

/* 底部按钮 */

.actions{
position:fixed;
bottom:40px;
display:flex;
gap:20px;
}

.btn{
padding:12px 26px;
border-radius:30px;
background:white;
color:#333;
font-size:14px;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

/* 地址弹窗 */

.address-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:20;
}

.address-box{
background:white;
width:90%;
max-width:420px;
border-radius:16px;
padding:20px;
text-align:center;
}

.address-box h2{
margin-bottom:10px;
}

.address-box img{
width:100%;
margin-top:10px;
border-radius:10px;
}

.map-btn{
margin-top:15px;
padding:12px;
background:#2c7a7b;
color:white;
border-radius:8px;
cursor:pointer;
display:block;
text-decoration:none;
}

.close-btn{
margin-top:12px;
color:#666;
cursor:pointer;
}

</style>
</head>

<body>

<!-- 打开邀请函 -->

<div class="cover" id="cover">
<h1>亲子音乐会邀请函</h1>
<div class="open-btn" onclick="openInvite()">打开邀请函</div>
</div>

<!-- 主内容 -->

<div class="main">

<div class="poster">
<img src="poster.jpg">
</div>

</div>

<!-- 音乐按钮 -->

<div class="music" id="musicBtn">🎵</div>

<audio id="bgm" src="music.mp3" loop></audio>

<!-- 底部按钮 -->

<div class="actions">

<div class="btn" onclick="showAddress()">导航地址</div>

<div class="btn" onclick="shareTip()">分享邀请</div>

</div>

<!-- 地址弹窗 -->

<div class="address-popup" id="addressPopup">

<div class="address-box">

<h2>活动地址</h2>

<img src="map1.jpg">

<img src="map2.jpg">

<a class="map-btn" href="https://map.baidu.com/poi/%E8%8D%A3%E5%88%A9%E4%B8%8D%E9%94%88%E9%92%A2%E7%BB%8F%E8%90%A5%E9%83%A8/@12685857.204999996,2586120.2,19z?uid=e47c03759589f68acf06a4d6&ugc_type=3&ugc_ver=1&device_ratio=1&compat=1&en_uid=e47c03759589f68acf06a4d6&pcevaname=pc4.1&querytype=detailConInfo&da_src=shareurl" target="_blank">
打开地图导航
</a >

<div class="close-btn" onclick="closeAddress()">关闭</div>

</div>

</div>

<script>

const music=document.getElementById("bgm")
const btn=document.getElementById("musicBtn")

function openInvite(){

document.getElementById("cover").style.opacity=0

setTimeout(()=>{
document.getElementById("cover").style.display="none"
},800)

music.play()

}

btn.onclick=function(){

if(music.paused){
music.play()
btn.classList.remove("pause")
}else{
music.pause()
btn.classList.add("pause")
}

}

function showAddress(){
document.getElementById("addressPopup").style.display="flex"
}

function closeAddress(){
document.getElementById("addressPopup").style.display="none"
}

function shareTip(){
alert("点击右上角即可分享给朋友或朋友圈 🎉")
}

</script>

</body>
</html>
