<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>万物声长 · 亲子音乐会邀请函</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: "PingFang SC","Microsoft YaHei",sans-serif;
background:#f5f5f5;
color:white;
overflow:hidden;
}

/* 打开页 */

.cover{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(135deg,#2c7a7b,#1a365d);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:10;
transition:1s;
}

.cover h1{
font-size:32px;
margin-bottom:30px;
letter-spacing:4px;
}

.open-btn{
padding:14px 40px;
background:white;
color:#333;
border-radius:40px;
font-size:18px;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* 主内容 */

.main{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* 海报 */

.poster{
width:90%;
max-width:520px;
margin: 20px auto; /* 上下左右居中，并留出空白 */
border-radius:12px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
animation:float 6s ease-in-out infinite;
}

.poster img{
width:100%;
display:block;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0px)}
}

/* 音乐按钮 */

.music{
position:fixed;
top:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:rgba(255,255,255,0.9);
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
animation:spin 6s linear infinite;
}

.music.pause{
animation:none;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

/* 底部按钮 */

.actions{
position:fixed;
bottom:40px;
display:flex;
gap:20px;
}

.btn{
padding:12px 26px;
border-radius:30px;
background:white;
color:#333;
font-size:14px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- 打开邀请函 -->

<div class="cover" id="cover">
<h1>亲子音乐会邀请函</h1>
<div class="open-btn" onclick="openInvite()">打开邀请函</div>
</div>

<!-- 主内容 -->

<div class="main">

<div class="poster">
<img src="poster.jpg">
</div>

</div>

<!-- 音乐 -->

<div class="music" id="musicBtn">🎵</div>

<audio id="bgm" src="music.mp3" loop></audio>

<!-- 底部按钮 -->

<div class="actions">

<div class="btn" onclick="openMap()">导航地址</div>

<div class="btn" onclick="shareTip()">分享邀请</div>

</div>

<script>

const music=document.getElementById("bgm")
const btn=document.getElementById("musicBtn")

function openInvite(){

document.getElementById("cover").style.opacity=0
setTimeout(()=>{
document.getElementById("cover").style.display="none"
},1000)

music.play()

}

btn.onclick=function(){

if(music.paused){
music.play()
btn.classList.remove("pause")
}else{
music.pause()
btn.classList.add("pause")
}

}

/* 打开地图 */

function openMap(){

window.open(
"https://uri.amap.com/search?keyword=光明新区碧眼旧村733号"
)

}

/* 分享提示 */

function shareTip(){

alert("点击右上角即可分享给朋友或朋友圈 🎉")

}

</script>

</body>
</html>
